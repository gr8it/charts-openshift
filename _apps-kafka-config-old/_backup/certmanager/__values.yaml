# cert-manager integration (optional)
# When enabled, the chart can create a cert-manager `Certificate` for a CA
# and will sync the resulting secret into a Strimzi-compatible CA secret name.
# If you enable this, set `certManager.createCA` and provide a functional
# `issuerRef` (ClusterIssuer or Issuer). The chart will create a post-install job
# to copy `tls.crt`/`tls.key` into a secret containing `ca.crt`/`ca.key` for Strimzi.
certManager:
  enabled: false
  # If true the chart creates a cert-manager Certificate resource for a CA
  createCA: false
  # The cert-manager Certificate will write its secret to this name
  secretName: "kafka-cluster-ca-tls"
  # The name of the secret Strimzi expects with keys `ca.crt` and `ca.key`.
  # If empty the template will default to "<release-name>-cluster-ca".
  caSecretName: ""
  # Issuer reference for cert-manager (ClusterIssuer or Issuer)
  issuerRef:
    name: ""
    kind: "ClusterIssuer"

  # Secret-sync job configuration
  sync:
    enabled: true
    # Image used to run the sync script (must include kubectl & sh)
    image: "bitnami/kubectl:1.27.3"
    # ServiceAccount, Role/RoleBinding names will be suffixed with release name
    backoffLimit: 3
