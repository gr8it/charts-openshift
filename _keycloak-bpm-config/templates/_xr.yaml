apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: example
spec:
  compositeTypeRef:
    apiVersion: apc.cloud.socpoist.sk/v1alpha1
    kind: mikroservice
  mode: Pipeline
  pipeline:
  - step: patch-and-transform-something
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: oidc-client
        base:
          apiVersion: openidclient.keycloak.m.crossplane.io/v1alpha1
          kind: Client
          metadata:
            name: namespaced-test-patch-and-transform
            namespace: test
          spec:
            forProvider:
              realmId: apps
              clientId: namespaced-test-pat
              name: namespaced-test-pat
              # description: BPM mikrosluzba
              accessType: BEARER-ONLY # CONFIDENTIAL, PUBLIC, BEARER-ONLY
              # frontchannelLogoutEnabled: true
            providerConfigRef:
              name: keycloak-local-config
              kind: ProviderConfig

  - step: create-a-bucket
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        options:
          - missingkey=error
        template: |

          apiVersion: openidclient.keycloak.m.crossplane.io/v1alpha1
          kind: Client
          metadata:
            name: namespaced-test-go-templating
            namespace: test
          spec:
            forProvider:
              realmId: apps
              clientId: namespaced-test-gt
              name: namespaced-test-gz
              # description: BPM mikrosluzba
              accessType: BEARER-ONLY # CONFIDENTIAL, PUBLIC, BEARER-ONLY
              # frontchannelLogoutEnabled: true
            providerConfigRef:
              name: keycloak-local-config
              kind: ProviderConfig

#     region: {{ .observed.composite.resource.spec.region }}

  - step: automatically-detect-readiness
    functionRef:
      name: function-auto-ready
---

apiVersion: apc.cloud.socpoist.sk/v1alpha1
kind: mikroservice
metadata:
  name: example
  namespace: test
spec:
  # crossplane:
  #   compositionRef:
  #     name: example
  name: bpm
