{{- if eq (include "apc-global-overrides.clusterIsHub" .) "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-logging-write-audit-logs-spoke-logforward
  labels:
    {{- include "logging-instance.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-logging-write-audit-logs
subjects:
  - kind: ServiceAccount
    name: spoke-logforward
    namespace: {{ .Release.Namespace }}
{{- end }}
