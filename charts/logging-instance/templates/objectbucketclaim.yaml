{{- if .Values.objectBucketClaim.enabled }}
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: {{ .Values.objectBucketClaim.name | default (include "logging-instance.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logging-instance.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.objectBucketClaim.storageClassName }}
  bucketName: {{ .Values.objectBucketClaim.bucketName | default (include "logging-instance.fullname" .) }}
{{- end }}
