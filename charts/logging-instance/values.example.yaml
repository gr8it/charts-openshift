# Example values for a spoke cluster with hub forwarding enabled
global:
  apc:
    cluster:
      isHub: false
    environmentShort: p
    services:
      externalSecretsOperator:
        defaultClusterSecretStore: apc
      vault:
        KVmountPlatform: apc-platform

lokistack:
  size: 1x.small
  limits:
    global:
      ingestion:
        ingestionRate: 20
        ingestionBurstSize: 40
      retention:
        days: 20

collector:
  resources:
    limits:
      cpu: 8
      memory: 8Gi
    requests:
      cpu: 500m
      memory: 1Gi

auditToHub:
  enabled: true
  url: "https://loki-gateway-openshift-logging.apps.hub01.example.com/api/logs/v1/audit/loki/api/v1/push"

pgaudit:
  enabled: true
  url: "https://vector-webhook.example.com/"

externalSecret:
  refreshInterval: "15m"

monitoring-reminder:
  reminders:
    HubSpokeLogforwardTokenExpirySoon:
      summary: "hub-spoke-logforward Vault token is expiring soon"
      description: >
        The bound ServiceAccount token for hub-spoke-logforward (stored in Vault,
        synced via ExternalSecret) is nearing its expiry. Audit log forwarding to
        the hub will stop working once it expires. Create a new token on the hub
        and update the Vault entry (see README).
      datetime: "01.01.2099"
      critical: true
