nameOverride: ""
fullnameOverride: ""

# --- ObjectBucketClaim ---
objectBucketClaim:
  storageClassName: ocs-storagecluster-ceph-rgw
  name: ~
  bucketName: ~

# --- LokiStack ---
lokistack:
  name: ~
  size: 1x.pico
  storage:
    schemas:
      - effectiveDate: "2024-10-01"
        version: v13
  storageClassName: ocs-storagecluster-ceph-rbd
  replication:
    factor: 2
    zones:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
  limits:
    global:
      ingestion:
        ingestionRate: 6
        ingestionBurstSize: 32
        perStreamRateLimit: 4
        perStreamRateLimitBurst: 17
      queries:
        queryTimeout: 5m
      retention:
        days: 7
  # rules: ~  # uncomment and configure to enable LokiStack alerting rules

# --- UIPlugin ---
uiplugin:
  # Workaround for issue https://access.redhat.com/solutions/6998442
  timeout: 120s

# --- ClusterLogForwarder collector ---
collector:
  resources:
    limits:
      cpu: "6"
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 512Mi

# --- Audit to hub forwarding ---
auditToHub:
  enabled: false
  url: ""

# --- Postgres audit forwarding (vector webhook) ---
pgaudit:
  enabled: false
  url: ""

# --- ExternalSecret (hub-spoke token) ---
# created automatically on spoke clusters only (not hub)
externalSecret:
  refreshInterval: "15m"

# --- Hub-specific resources ---
hub:
  alertingRules:
    customerName: ""
    # ACS policy violation alerting via Loki AlertingRule is intentionally not
    # supported here - ACS alert delivery is expected to use the RHACS Generic
    # Webhook -> Vector -> Jira Operations path instead.
    hwEvents:
      enabled: false
