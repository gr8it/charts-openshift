suite: Snapshot test
templates:
  - templates/*
release:
  name: logging-instance
  namespace: openshift-logging

tests:
  - it: manifests should match snapshot
    values:
      - ../values.example.yaml
    asserts:
      - matchSnapshot: {}
  - it: hub manifests should match snapshot
    values:
      - ../values.example.hub.yaml
    asserts:
      - matchSnapshot: {}
