---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "etcd-hcp-backup.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "etcd-hcp-backup.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backupSchedule | quote }}
  concurrencyPolicy: Forbid
  suspend: false
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 7
  jobTemplate:
    metadata:
      labels:
        {{- include "etcd-hcp-backup.labels" . | nindent 8 }}
    spec:
      template:
        metadata:
          labels:
            {{- include "etcd-hcp-backup.labels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ include "etcd-hcp-backup.fullname" . }}
          restartPolicy: Never
          initContainers:
          - name: init
            image: {{ .Values.image.ocpcli }}
            command: ["/bin/bash", "/usr/local/bin/init.sh"]
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
            resources:
              requests:
                memory: "256Mi"
                cpu: "50m"
              limits:
                memory: "512Mi"
                cpu: "100m"
            volumeMounts:
            - name: workdir
              mountPath: /backup
            - name: scripts
              mountPath: /usr/local/bin/init.sh
              subPath: init.sh
              readOnly: true
            env:
            - name: STATEFULSET
              valueFrom:
                configMapKeyRef:
                  name: {{ include "etcd-hcp-backup.fullname" . }}-scripts
                  key: env.etcdsts
            - name: HCPNS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "etcd-hcp-backup.fullname" . }}-scripts
                  key: env.hcpns
          - name: snapshot
            image: {{ .Values.image.etcd }}
            command: ["/bin/bash", "/usr/local/bin/etcdsnap.sh"]
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "300m"
            volumeMounts:
            - name: workdir
              mountPath: /backup
            - name: scripts
              mountPath: /usr/local/bin/etcdsnap.sh
              subPath: etcdsnap.sh
              readOnly: true
            env:
            - name: HCPNS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "etcd-hcp-backup.fullname" . }}-scripts
                  key: env.hcpns
            - name: FILEPREFIX
              valueFrom:
                configMapKeyRef:
                  name: {{ include "etcd-hcp-backup.fullname" . }}-scripts
                  key: env.fileprefix
            - name: COMPRESS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "etcd-hcp-backup.fullname" . }}-scripts
                  key: env.compress
          containers:
          - name: s3backup
            image: {{ .Values.image.awscli }}
            command: ["/bin/bash", "/usr/local/bin/s3upload.sh"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
            volumeMounts:
            - name: workdir
              mountPath: /backup
            - name: scripts
              mountPath: /usr/local/bin/s3upload.sh
              subPath: s3upload.sh
              readOnly: true
            - name: s3ca
              mountPath: /etc/ssl/certs/s3ca.crt
              subPath: service-ca.crt
              readOnly: true
            - name: tmp
              mountPath: /tmp
            env:
            - name: RETENTION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "etcd-hcp-backup.fullname" . }}-scripts
                  key: env.retention
            - name: FILEPREFIX
              valueFrom:
                configMapKeyRef:
                  name: {{ include "etcd-hcp-backup.fullname" . }}-scripts
                  key: env.fileprefix
            - name: AWS_CA_BUNDLE
              value: "/etc/ssl/certs/s3ca.crt"
            envFrom:
            - secretRef:
                name: {{ include "etcd-hcp-backup.obcName" . }}
            - configMapRef:
                name: {{ include "etcd-hcp-backup.obcName" . }}
            resources:
              requests:
                memory: "256Mi"
                cpu: "200m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          volumes:
          - name: workdir
            emptyDir:
              sizeLimit: 10Gi
          - name: scripts
            configMap:
              name: {{template "etcd-hcp-backup.fullname" . }}-scripts
              defaultMode: 0555
          - name: s3ca
            configMap:
              name: openshift-service-ca.crt
          - name: tmp
            emptyDir: {}
