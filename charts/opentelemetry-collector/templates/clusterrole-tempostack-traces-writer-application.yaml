---
# ClusterRole needed to grant permissions to the service account to write traces and metrics to default application tenant
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "opentelemetry-collector.fullname" . }}-tempostack-writer-application
  labels:
    {{- include "opentelemetry-collector.labels" . | nindent 4 }}
    rbac.authorization.k8s.io/apc-opentelemetry-collector-apc-observability-cluster-role: "true"
rules:
  - apiGroups:
      - tempo.grafana.com
    resources:
      - application
    resourceNames:
      - traces
    verbs:
      - 'create'