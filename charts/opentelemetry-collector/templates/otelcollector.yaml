---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ .Values.instanceNameOverride | default (include "opentelemetry-collector.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opentelemetry-collector.labels" . | nindent 4 }}
spec:
  mode: deployment
  replicas : {{ .Values.OpenTelemetryCollector.replicas | default 1 }}
  serviceAccount: {{ include "opentelemetry-collector.fullname" . }}-deployment
  {{- if .Values.OpenTelemetryCollector.image }}
  image: {{ .Values.OpenTelemetryCollector.image }}
  {{- end }}
  observability:
    metrics:
      enableMetrics: true
  config:
    extensions:
      bearertokenauth:
        filename: "/var/run/secrets/kubernetes.io/serviceaccount/token"
    receivers:
      jaeger:
        protocols:
          grpc: {}
          thrift_binary: {}
          thrift_compact: {}
          thrift_http: {}
      otlp:
        protocols:
          grpc: {}
          http: {}
      zipkin: {}
    processors:
      batch: {}
      k8sattributes:
        extract:
          metadata: [k8s.namespace.name]
      memory_limiter:
        check_interval: 1s
        limit_percentage: 50
        spike_limit_percentage: 30
      resourcedetection:
        detectors: [openshift]
    connectors:
      routing:
        default_pipelines: [traces/application]
        table:
          - statement: route() where resource.attributes["k8s.namespace.name"] == "application"
            pipelines: [traces/application]
    exporters:
      otlp/application:
        endpoint: {{ .Values.tracesEndpoint | required "Traces endpoint is required!" }}
        auth: { authenticator: bearertokenauth }
        headers:
          X-Scope-OrgID: application
        tls:
          insecure: false
          ca_file: "/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt"
      otlphttp/loki:
        endpoint: {{ .Values.logsEndpoint | required "Logs endpoint is required!" }}
        auth: { authenticator: bearertokenauth }
        tls:
          insecure: false
          ca_file: "/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt"
      prometheus:
        endpoint: {{ .Values.metricsEndpoint | required "Metrics endpoint is required!" }}
        resource_to_telemetry_conversion:
          enabled: true
    service:
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      extensions: [bearertokenauth]
      pipelines:
        traces:
          receivers: [jaeger,otlp,zipkin]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [routing]
        traces/application: { receivers: [routing], exporters: [otlp/application] }
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [otlphttp/loki]
