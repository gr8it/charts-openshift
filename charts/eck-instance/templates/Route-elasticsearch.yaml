apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Release.name }}-es
  namespace: {{ .Release.namespace }}
spec:
  #host: elasticsearch.example.com
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: {{ .Release.name }}-es-http
