{{- $env := include "apc-global-overrides.environmentShort" $ }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-slm-admin-user
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "eck-instance.labels" $ | nindent 4 }}
spec:
  secretStoreRef:
    kind: SecretStore
    name: {{ $.Values.secretStore }}
  refreshInterval: "1h0m0s"
  target:
    name: {{ .Release.Name }}-slm-admin-user
    deletionPolicy: Retain
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ printf "%s/%s/elasticsearch/slmadmin" $env $.Release.Namespace }}
