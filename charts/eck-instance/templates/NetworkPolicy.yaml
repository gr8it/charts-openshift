apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eds-allow-from-eck-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eck-instance.labels" . | nindent 4 }}
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: eck-operator
  podSelector: {}
  policyTypes:
  - Ingress
