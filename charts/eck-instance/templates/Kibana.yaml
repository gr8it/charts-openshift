apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: {{ .Release.name }}
  namespace: {{ .Release.namespace }}
spec:
  version: {{ .Values.kibana.version }}
  count: {{ .Values.kibana.nodesCount }}
  elasticsearchRef:
    name: "{{ .Release.name }}"
  podTemplate:
    spec:
      containers:
      - name: kibana
        resources:
          limits:
            memory: {{ .Values.kibana.requests.memory }}
            cpu: {{ .Values.kibana.requests.cpu }}
          requests:
            memory: {{ .Values.kibana.limits.memory }}
            cpu: {{ .Values.kibana.limits.cpu }}
