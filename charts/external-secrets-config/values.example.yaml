global:
  apc:
    caCertificates:
      example.crt: |
        -----BEGIN CERTIFICATE-----
        aaa
        -----END CERTIFICATE-----
      example2.crt: |
        -----BEGIN CERTIFICATE-----
        bbb
        -----END CERTIFICATE-----
    environmentShort: d
    cluster:
      name: dev01
      runsApps: true
    services:
      vault:
        url: https://vault.example.com
        kubeAuthMountPath: dev01
        KVmountPlatform: apc-platform
      crossplane:
        kubeVaultProviderConfigName: vault-hub-provider-config
      externalSecretsOperator:
        defaultClusterSecretStore: vault-example
