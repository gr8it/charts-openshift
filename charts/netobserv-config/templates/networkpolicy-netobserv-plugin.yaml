apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apc-netobserv-plugin-network-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netobserv-config.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: netobserv-plugin
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-console
          podSelector:
            matchLabels:
              app: console
              component: ui
      ports:
        - port: 9001
          protocol: TCP
