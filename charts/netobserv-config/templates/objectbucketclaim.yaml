{{- if .Values.objectBucketClaim.enabled }}
{{- $bucketName := .Values.objectBucketClaim.bucketName | default (printf "apc-%s-rgw" (include "netobserv-config.fullname" .) | trunc 63 | trimSuffix "-") }}
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: {{ include "netobserv-config.fullname" . }}-rgw
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netobserv-config.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.objectBucketClaim.storageClassName }}
  bucketName: {{ $bucketName }}
{{- end }}
