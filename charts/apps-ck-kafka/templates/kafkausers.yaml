{{- /* convert superUsers list to a list of dictionaries name = value of the superUsers */ -}}
{{- $transformedB := list -}}
{{- range .Values.kafka.superUsers -}}
  {{- $transformedB = append $transformedB (dict "name" .) -}}
{{- end -}}

{{- range $user := (concat .Values.kafkaUsers.users $transformedB) }}
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: {{ $user.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    strimzi.io/cluster: {{ include "apps-ck-kafka.fullname" $ }}
    {{- include "apps-ck-kafka.labels" $ | nindent 4 }}
spec:
  authentication:
    {{- if eq $user.name "apc-kafka-admin" }}
    type: scram-sha-512
    # do not specify password here to let Strimzi generate one automatically including sasl.jaas.config!
    {{- else }}
    type: scram-sha-512
    password:
      valueFrom:
        secretKeyRef:
          name: "{{ $user.name }}-eso"
          key: password
    {{- end }}
  authorization:
    type: simple
    {{- if $user.acls }}
    acls:
      {{- range $acl := $user.acls }}
      - resource:
          type: {{ $acl.resourceType | quote }}
          {{- if $acl.resourceName }}
          name: {{ $acl.resourceName | quote }}
          {{- end }}
          {{- if $acl.patternType }}
          patternType: {{ $acl.patternType | default "literal" }}
          {{- end }}
        operations:
          {{- range $op := $acl.operations }}
          - {{ $op }}
          {{- end }}
        host: {{ $acl.host | default "*" | quote }}
      {{- end }}
    {{- else }}
    acls: []
    {{- end }}
---
{{- end }}
