{{- if .Values.kafkaBridge.oauthProxy.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-token-reviews
  labels:
    {{- include "apps-kafka-bridge.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-oauth-proxy
  namespace: {{ .Release.Namespace }}
{{- end }}
