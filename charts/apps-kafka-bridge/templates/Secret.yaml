{{- if .Values.kafkaBridge.oauthProxy.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-account-access
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apps-kafka-bridge.labels" . | nindent 4 }}
stringData:
  description: Fake Secret to give service account access to a given service behind openshift-oauth-proxy.
{{- end }}
