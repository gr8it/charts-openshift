apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: {{ include "crossplane-keycloak-provider.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-keycloak-provider.labels" . | nindent 4 }}
spec:
  deploymentTemplate:
    spec:
      replicas: {{ .Values.replicas }}
      selector: {}
      template:
        spec:
          containers:
          - name: package-runtime
            args:
              - --debug
              # - --enable-external-secret-stores
            resources:
              limits:
                cpu: {{ .Values.resources.limits.cpu }}
                memory: {{ .Values.resources.limits.memory }}
              requests:
                cpu: {{ .Values.resources.requests.cpu }}
                memory: {{ .Values.resources.requests.memory }}
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
            # securityContext: {}
              # allowPrivilegeEscalation: false
              # privileged: false
              # runAsGroup: ~
              # runAsNonRoot: true
              # runAsUser: ~
            # - mountPath: /etc/ssl/certs/isreg.crt
            #   name: custom-ca-certs
            #   readOnly: true
            #   subPath: isreg.crt
            # - mountPath: /etc/ssl/certs/sp-gr8it-cloud.crt
            #   name: custom-ca-certs
            #   readOnly: true
            #   subPath: sp-gr8it-cloud.crt
          securityContext: {}
          topologySpreadConstraints:
          - labelSelector:
              matchLabels:
                pkg.crossplane.io/provider: {{ include "crossplane-keycloak-provider.fullname" . }}
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
          # - configMap:
          #     name: kube-root-ca.crt
          #   name: custom-ca-certs
