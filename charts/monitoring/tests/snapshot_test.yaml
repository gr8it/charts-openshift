suite: Snapshot test
templates:
  - templates/*
values:
  - ../values.example.yaml
release:
  name: monitoring
  namespace: openshift-monitoring

tests:
  - it: manifests should match snapshot (hub cluster)
    asserts:
      - matchSnapshot: {}

  - it: manifests should match snapshot (non-hub cluster)
    set:
      global.apc.cluster.isHub: false
    asserts:
      - matchSnapshot: {}
