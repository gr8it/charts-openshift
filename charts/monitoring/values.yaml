nameOverride: ""
fullnameOverride: ""

# --- ClusterMonitoringConfig (openshift-monitoring) ---
clusterMonitoring:
  location: primary
  prometheus:
    retention: "7d"
    storageSize: "60Gi"
    storageClassName: ocs-storagecluster-ceph-rbd
  alertmanager:
    storageSize: "1Gi"
    storageClassName: ocs-storagecluster-ceph-rbd

# --- AlertManager receivers secrets (cluster + UWM) via ESO ---
# All alertmanager credentials are stored in a single Vault secret path per alertmanager (dataFrom.extract).
# Hub-specific keys (opsgenie_key_acs, opsgenie_key_logs) must be present in the Vault secret on hub clusters.
# Hub detection uses global.apc.cluster.isHub via apc-global-overrides.
eso:
  enabled: true
  refreshInterval: "15m"

alertmanager:
  vault:
    # Full Vault secret path, e.g. customers/socpoist/monitoring/alertmanager
    secretPath: ""

# --- UserWorkloadMonitoringConfig (openshift-user-workload-monitoring) ---
userWorkloadMonitoring:
  location: primary
  prometheus:
    retention: "14d"
    storageSize: "24Gi"
    storageClassName: ocs-storagecluster-ceph-rbd
    remoteWrite:
      enabled: true
      secretName: telemetry-remote-write
      url: https://infogw.api.openshift.com/metrics/v1/receive
      proxyUrl: ~
      writeRelabelConfigs:
        - action: keep
          regex: (count:up0|count:up1|cluster_version)
          sourceLabels:
            - __name__
  thanosRuler:
    storageSize: "1Gi"
    storageClassName: ocs-storagecluster-ceph-rbd

uwmAlertmanager:
  vault:
    # Full Vault secret path, e.g. customers/socpoist/monitoring/alertmanager-uwm
    secretPath: ""

# --- NetworkPolicy (proxy egress for openshift-monitoring and openshift-user-workload-monitoring) ---
# proxyCIDRs are read from global.apc.proxyCIDRs via apc-global-overrides
networkPolicy:
  enabled: true

# --- Vault bastion monitoring (Service + Endpoints + ServiceMonitor in apc-monitoring-bastion) ---
# Set bastionIP to enable vault bastion scraping
vaultBastionMonitoring:
  bastionIP: ""

# --- Velero backup Schedules via openshift-adp-backups subchart ---
backups:
  enabled: true
  namespace: openshift-adp
  schedules:
    - name: monitoring-daily
      namespace: openshift-adp
      spec:
        schedule: "0 2 * * *"
        template:
          includedNamespaces:
            - openshift-monitoring
    - name: uwm-daily
      namespace: openshift-adp
      spec:
        schedule: "0 3 * * *"
        template:
          includedNamespaces:
            - openshift-user-workload-monitoring
