apiVersion: v2
name: monitoring
description: Helm chart for OpenShift cluster monitoring (ClusterMonitoringConfig, UserWorkloadMonitoringConfig, AlertManager via ESO, Kyverno PrometheusRule generation)
type: application
version: 1.1.0

dependencies:
  - name: apc-global-overrides
    version: 1.8.0
    repository: https://raw.githubusercontent.com/gr8it/charts-openshift/refs/heads/main/
  - name: monitoring-prometheusrules
    version: 1.0.6
    repository: https://raw.githubusercontent.com/gr8it/charts-openshift/refs/heads/main/
  - name: openshift-adp-backups
    version: "1.0.0"
    alias: backups
    condition: backups.enabled
    repository: https://raw.githubusercontent.com/gr8it/charts-openshift/refs/heads/main/
