apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ldap-monitoring
  namespace: apc-monitoring-bastion
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  groups:
    - name: ldap-monitor
      rules:
        - alert: LdapServiceUp
          expr: openldap_service_up != 1
          for: 1m
          labels:
            severity: critical
            vendor: aspecta
            team: platform
          annotations:
            summary: "LDAP service {{ `{{ $labels.host }}` }} is down."
            description: "LDAP service {{ `{{ $labels.host }}` }} is down."
        - alert: LdapReplicationTimestamp
          expr: max by (replica_id) (openldap_replication_sync_timestamp) != min by (replica_id) (openldap_replication_sync_timestamp)
          for: 1m
          labels:
            severity: critical
            vendor: aspecta
            team: platform
          annotations:
            summary: "Inconsistent sync timestamp for {{ `{{ $labels.replica_id }}` }}"
            description: "Replica ID {{ `{{ $labels.replica_id }}` }} has inconsistent sync timestamp across servers. LDAP instances are not synchonized."
        - alert: LdapSingleReplica
          expr: count by (replica_id) (openldap_replication_sync_timestamp) == 1
          for: 5m
          labels:
            severity: warning
            vendor: aspecta
            team: platform
          annotations:
            summary: "Only single instance found for repica id {{ `{{ $labels.replica_id }}` }}"
            description: "Replica ID {{ `{{ $labels.replica_id }}` }} has only single instance. LDAP replication is not working properly."
