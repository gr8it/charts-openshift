{{- if .Values.vaultBastionMonitoring.bastionIP }}
kind: Service
apiVersion: v1
metadata:
  name: vault-bastion
  namespace: apc-monitoring-bastion
  labels:
    app: vault-bastion
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  clusterIP: None
  type: ClusterIP
  ports:
  - name: metrics
    port: 8200
    targetPort: 8200
{{- end }}
