apiVersion: v1
kind: Service
metadata:
  name: {{ include "sql-server.fullname" . }}
  labels:
    {{- include "sql-server.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.spec.ports.sqlServerDatabasePort }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sql-server.selectorLabels" . | nindent 4 }}
