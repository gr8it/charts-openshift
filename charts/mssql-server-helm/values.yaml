---
mssql:
  pid: Evaluation
  conf:
    eula:
      accepteula: true
      accepteulaml: true
    lcid: 1033 # english
    sqlagent:
      enabled: true

statefulset:
  template:
    metadata:
      annotations: {}
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroupChangePolicy: OnRootMismatch
      containers:
        sqlServer:
          image:
            repository: mcr.microsoft.com/mssql/server
            pullPolicy: IfNotPresent
            tag: 2019-latest
          ports:
            databaseEngineContainerPort: 1433
          extraVolumeMounts: []
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
      volumes:
        extraVolumes: []

service:
  spec:
    ports:
      sqlServerDatabasePort: 1433

storageClass:
  name: ocs-storagecluster-ceph-rbd
  
storage:
  size: 8
