# HyperConverged (OpenShift Virtualization) configuration.
# The spec is opinionated and uniform across clusters; only the live-migration
# network (a per-cluster NAD name) is exposed.
hyperconverged:
  # Additional network (NAD name in openshift-cnv) used for live-migration traffic.
  liveMigrationNetwork: vmlm

# CNV secondary networks merged into the cluster Network operator's
# additionalNetworks (merge-keyed by name, applied via ServerSideApply so
# other owners' entries such as the ODF network are left intact).
# Empty by default; set per cluster in the conf repo.
additionalNetworks: []
# - name: vmlm
#   namespace: openshift-cnv
#   type: Raw
#   rawCNIConfig: |-
#     { "cniVersion": "0.3.1", "name": "vmlm", "type": "macvlan", ... }
