{{- $roleDefaultSettings := .Values.pkiIssuers.pkiRoles.defaultSettings  }}
{{- range $role, $roleData := .Values.pkiIssuers.pkiRoles.roles }}
apiVersion: pki.vault.upbound.io/v1alpha1
kind: SecretBackendRole
metadata:
  name: {{ $roleData.name }}-role
  annotations:
    crossplane.io/external-name: {{ $roleData.backend }}/roles/{{ $roleData.name }}
    {{- include "vault-config.labels" $ | nindent 4 }}
spec:
  deletionPolicy: Orphan
  managementPolicy: ["Create","Update", "Observe", "LateInitialize"]
  forProvider:
    name: {{ $roleData.name }}
    backend: {{ $roleData.backend }}
    issuerRef: {{ $roleData.issuerRef }}
    {{- $roleDefaultSettings | toYaml | nindent 4 }}
    allowedDomains:
      {{- $roleData.allowedDomains | toYaml | nindent 6 }}
  providerConfigRef:
    name: {{ include "apc-global-overrides.crossplaneKubeVaultProviderConfigName" $ }}
---
{{- end }}
