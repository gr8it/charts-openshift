{{- if eq (include "apc-global-overrides.clusterIsHub" .) "true" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.networkPolicy.name }}
  namespace: {{ .Values.networkPolicy.namespace }}
  labels:
    {{- include "multi-cluster-observability.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
      {{- range .Values.networkPolicy.egressCidrs }}
        - ipBlock:
            cidr: {{ . }}
      {{- end }}
{{- end }}
