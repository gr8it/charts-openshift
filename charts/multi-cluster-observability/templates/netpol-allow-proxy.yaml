{{- if (include "apc-global-overrides.proxy" .) | default false }}
{{- $CIDRs := ( include "apc-global-overrides.require-proxyCIDRs" . | fromYamlArray) }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "multi-cluster-observability.fullname" . }}-allow-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multi-cluster-observability.labels" . | nindent 4 }}
spec:
  egress:
    - to:
        {{- range $CIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
  podSelector: {}
  policyTypes:
    - Egress
{{- end }}
