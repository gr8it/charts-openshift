{{- if eq (include "apc-global-overrides.clusterIsHub" .) "true" }}
{{- $proxy := include "apc-global-overrides.proxy" . | trim }}
{{- $noProxy := include "apc-global-overrides.noProxy" . | trim }}
{{- $secretStore := include "apc-global-overrides.require-ESODefaultClusterSecretStore" . }}
{{- $vaultKVmountPlatform := include "apc-global-overrides.require-vaultKVmountPlatform" . }}
{{- $environmentShort := include "apc-global-overrides.require-environmentShort" . }}
{{- $vaultKey := .Values.alertmanagerConfig.vault.key | required "alertmanagerConfig.vault.key is required" }}
{{- $vaultProperty := .Values.alertmanagerConfig.vault.property | required "alertmanagerConfig.vault.property is required" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multi-cluster-observability.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    name: {{ $secretStore }}
    kind: ClusterSecretStore
  refreshInterval: "15m"
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "multi-cluster-observability.labels" . | nindent 10 }}
      data:
        alertmanager.yaml: |
          "global":
            "resolve_timeout": "5m"
          "receivers":
          - name: "null"
          - name: "teams_aspecta"
            msteams_configs:
              - send_resolved: true
{{- if $proxy }}
                http_config:
                  proxy_url: {{ $proxy }}
{{- if $noProxy }}
                  no_proxy: {{ $noProxy }}
{{- end }}
{{- end }}
                webhook_url: "{{ `{{ .webhookUrl }}` }}"
          "route":
            "group_by": ['alertname', 'cluster', 'service']
            "group_wait": "30s"
            "group_interval": "5m"
            "receiver": "teams_aspecta"
            "repeat_interval": "12h"
            "routes":
            - "matchers":
              - "severity = warning"
              "receiver": "teams_aspecta"
            - "matchers":
              - "severity = critical"
              "receiver": "teams_aspecta"
            - "receiver": "null"
              "matchers":
              - alertname = Watchdog
            - "receiver": "null"
              "matchers":
              - severity =~ "info|none"
  data:
    - secretKey: webhookUrl
      remoteRef:
        key: {{ $vaultKVmountPlatform }}/{{ $environmentShort }}/{{ $vaultKey }}
        property: {{ $vaultProperty }}
{{- end }}
