{{- if and .Values.metricsAllowlists.enabled .Values.metricsAllowlists.configMaps }}
{{- $isHub := .Values.global.apc.cluster.isHub | default false }}
{{- range $cm := .Values.metricsAllowlists.configMaps }}
{{- $hubOnly := $cm.hubOnly | default false }}
{{- $spokeOnly := $cm.spokeOnly | default false }}
{{- if or (and $hubOnly $isHub) (and $spokeOnly (not $isHub)) (and (not $hubOnly) (not $spokeOnly)) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cm.name }}
  namespace: {{ $cm.namespace }}
  labels:
    {{- include "multi-cluster-observability.labels" $ | nindent 4 }}
data:
  {{ $cm.dataKey }}: |
    names:
{{- range $name := $cm.names }}
      - {{ $name }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
