suite: Alertmanager ServiceMonitor patch
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: renders the Alertmanager ServiceMonitor server-side apply patch for hub clusters
    template: templates/policy-alertmanager-servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: alertmanager
      - equal:
          path: metadata.namespace
          value: open-cluster-management-observability
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-options"]
          value: ServerSideApply=true
      - equal:
          path: spec.endpoints[0].port
          value: metrics
      - equal:
          path: spec.endpoints[0].scheme
          value: https
      - equal:
          path: spec.endpoints[0].bearerTokenFile
          value: /var/run/secrets/kubernetes.io/serviceaccount/token
      - equal:
          path: spec.endpoints[0].tlsConfig.serverName
          value: alertmanager-metrics.open-cluster-management-observability.svc
      - equal:
          path: spec.selector.matchLabels.app
          value: multicluster-observability-alertmanager-metrics
      - matchSnapshot: {}

  - it: does not render for non-hub clusters
    template: templates/policy-alertmanager-servicemonitor.yaml
    set:
      global.apc.cluster.isHub: false
    asserts:
      - hasDocuments:
          count: 0
