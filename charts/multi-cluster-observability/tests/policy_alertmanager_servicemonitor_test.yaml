suite: Alertmanager ServiceMonitor policy
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: renders the Alertmanager ServiceMonitor mutation policy for hub clusters
    template: templates/policy-alertmanager-servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Policy
      - equal:
          path: metadata.name
          value: patch-alertmanager-servicemonitor
      - equal:
          path: metadata.namespace
          value: open-cluster-management-observability
      - equal:
          path: spec.background
          value: false
      - equal:
          path: spec.rules[0].match.any[0].resources.kinds[0]
          value: monitoring.coreos.com/v1/ServiceMonitor
      - equal:
          path: spec.rules[0].match.any[0].resources.names[0]
          value: alertmanager
      - matchSnapshot: {}

  - it: does not render for non-hub clusters
    template: templates/policy-alertmanager-servicemonitor.yaml
    set:
      global.apc.cluster.isHub: false
    asserts:
      - hasDocuments:
          count: 0
