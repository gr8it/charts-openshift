suite: ObjectBucketClaim template
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: renders hardcoded object bucket claim for hub clusters
    template: templates/object-bucket-claim.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ObjectBucketClaim
      - equal:
          path: metadata.name
          value: acm-thanos-rgw
      - equal:
          path: metadata.namespace
          value: open-cluster-management-observability
      - equal:
          path: spec.storageClassName
          value: ocs-storagecluster-ceph-rgw
      - equal:
          path: spec.generateBucketName
          value: acm-thanos-rgw

  - it: does not render for non-hub clusters
    template: templates/object-bucket-claim.yaml
    set:
      global.apc.cluster.isHub: false
    asserts:
      - hasDocuments:
          count: 0
