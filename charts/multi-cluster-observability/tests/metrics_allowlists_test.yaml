suite: Metrics allowlists
templates:
  - templates/configmap-metrics-allowlists.yaml
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: renders hub allowlists without spoke-only Kafka configmap
    asserts:
      - hasDocuments:
          count: 3
      - matchSnapshot: {}

  - it: renders spoke allowlists with Kafka and External Secrets configmaps and without hub-only ones
    set:
      global.apc.cluster.isHub: false
    asserts:
      - hasDocuments:
          count: 3
      - matchSnapshot: {}
