suite: Proxy network policy
templates:
  - templates/netpol-allow-proxy.yaml
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: does not render when proxy is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders network policy when proxy and proxyCIDRs are set
    set:
      global.apc.proxy: http://proxy.example:8080
      global.apc.proxyCIDRs:
        - 10.0.0.1/32
        - 10.0.0.2/32
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 10.0.0.1/32
      - equal:
          path: spec.egress[0].to[1].ipBlock.cidr
          value: 10.0.0.2/32

  - it: fails when proxy is set without proxyCIDRs
    set:
      global.apc.proxy: http://proxy.example:8080
      global.apc.proxyCIDRs: []
    asserts:
      - failedTemplate:
          errorMessage: APC proxyCIDRs is required
