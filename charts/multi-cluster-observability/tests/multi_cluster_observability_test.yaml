suite: MultiClusterObservability template
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: renders hardcoded observability resource for hub clusters
    template: templates/multi-cluster-observability.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: MultiClusterObservability
      - equal:
          path: metadata.name
          value: observability
      - equal:
          path: metadata.annotations.mco-disable-alerting
          value: "true"
      - equal:
          path: spec.observabilityAddonSpec.interval
          value: 30
      - equal:
          path: spec.storageConfig.metricObjectStorage.name
          value: thanos-object-storage
      - equal:
          path: spec.storageConfig.metricObjectStorage.key
          value: thanos.yaml
      - equal:
          path: spec.advanced.retentionConfig.retentionResolutionRaw
          value: 35d

  - it: does not render for non-hub clusters
    template: templates/multi-cluster-observability.yaml
    set:
      global.apc.cluster.isHub: false
    asserts:
      - hasDocuments:
          count: 0
