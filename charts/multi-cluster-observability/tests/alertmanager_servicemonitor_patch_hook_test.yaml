suite: Alertmanager ServiceMonitor patch hook
templates:
  - templates/alertmanager-servicemonitor-patch-hook.yaml
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: renders patch hook resources for hub clusters
    asserts:
      - hasDocuments:
          count: 4
      - matchSnapshot: {}

  - it: does not render for non-hub clusters
    set:
      global.apc.cluster.isHub: false
    asserts:
      - hasDocuments:
          count: 0
