suite: Bucket secret policy
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: renders hardcoded Kyverno annotations for hub clusters
    template: templates/policy-object-bucket-secretinfo.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Policy
      - equal:
          path: metadata.name
          value: generate-thanos-object-storage-secret
      - equal:
          path: metadata.namespace
          value: open-cluster-management-observability
      - equal:
          path: metadata.annotations["policies.kyverno.io/title"]
          value: Generate Thanos Object Storage Secret
      - equal:
          path: metadata.annotations["policies.kyverno.io/category"]
          value: ODF
      - equal:
          path: metadata.annotations["policies.kyverno.io/subject"]
          value: Thanos Object Storage
      - equal:
          path: metadata.annotations["policies.kyverno.io/minversion"]
          value: 1.13.0
      - equal:
          path: spec.rules[0].name
          value: thanos-object-storage
      - equal:
          path: spec.rules[0].skipBackgroundRequests
          value: true
      - equal:
          path: spec.rules[0].generate.name
          value: thanos-object-storage
      - equal:
          path: spec.rules[0].generate.namespace
          value: open-cluster-management-observability
      - equal:
          path: spec.rules[0].generate.data.type
          value: Opaque
      - equal:
          path: spec.rules[0].generate.data.stringData["thanos.yaml"]
          value: |
            type: s3
            config:
              bucket: {{ obcconfigmap.data.BUCKET_NAME }}
              endpoint: {{ obcconfigmap.data.BUCKET_HOST }}:{{ obcconfigmap.data.BUCKET_PORT }}
              insecure: false
              access_key: "{{ base64_decode(obcsecret.data.AWS_ACCESS_KEY_ID || '') }}"
              secret_key: "{{ base64_decode(obcsecret.data.AWS_SECRET_ACCESS_KEY || '') }}"
              http_config:
                tls_config:
                  insecure_skip_verify: false
                  ca_file: /etc/ssl/certs/thanos/service-ca.crt

  - it: does not render for non-hub clusters
    template: templates/policy-object-bucket-secretinfo.yaml
    set:
      global.apc.cluster.isHub: false
    asserts:
      - hasDocuments:
          count: 0
