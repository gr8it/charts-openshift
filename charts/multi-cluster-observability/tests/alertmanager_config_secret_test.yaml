suite: Alertmanager config external secret
templates:
  - templates/alertmanager-config-secret.yaml
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: renders the hub alertmanager config external secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: alertmanager-config
      - equal:
          path: spec.secretStoreRef.name
          value: vault-hub-secret-store
      - equal:
          path: spec.data[0].remoteRef.key
          value: apc-platform/h/customers/socpoist/msteams
      - equal:
          path: spec.target.name
          value: alertmanager-config
      - matchSnapshot: {}

  - it: does not render for non-hub clusters
    set:
      global.apc.cluster.isHub: false
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when vault key is empty on hub
    set:
      alertmanagerConfig.vault.key: ""
    asserts:
      - failedTemplate:
          errorMessage: alertmanagerConfig.vault.key is required

  - it: fails when vault property is empty on hub
    set:
      alertmanagerConfig.vault.property: ""
    asserts:
      - failedTemplate:
          errorMessage: alertmanagerConfig.vault.property is required
