suite: Alertmanager config secret
templates:
  - templates/alertmanager-config-secret.yaml
values:
  - ../values.lint.yaml
release:
  name: multi-cluster-observability
  namespace: open-cluster-management-observability

tests:
  - it: renders the hub alertmanager config secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: alertmanager-config
      - equal:
          path: type
          value: Opaque
      - matchSnapshot: {}

  - it: does not render for non-hub clusters
    set:
      global.apc.cluster.isHub: false
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when webhookUrl is empty on hub
    set:
      alertmanagerConfig.webhookUrl: ""
    asserts:
      - failedTemplate:
          errorMessage: alertmanagerConfig.webhookUrl is required
