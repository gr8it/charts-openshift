{{- if and .Values.networkPolicy.enabled (include "apc-global-overrides.proxyCIDRs" . | fromYamlArray) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-proxy
  namespace: openshift-monitoring
  labels:
    {{- include "cluster-monitoring.labels" . | nindent 4 }}
spec:
  egress:
  - to:
    {{- range (include "apc-global-overrides.proxyCIDRs" . | fromYamlArray) }}
    - ipBlock:
        cidr: {{ . }}
    {{- end }}
  podSelector: {}
  policyTypes:
  - Egress
{{- end }}
