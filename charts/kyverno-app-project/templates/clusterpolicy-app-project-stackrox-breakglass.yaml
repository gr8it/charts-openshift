{{- if .Values.stackroxAdmissionBreakGlass.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: app-project-stackrox-breakglass
  labels:
  {{- include "kyverno-app-project.labels" . | nindent 4 }}
  annotations:
    policies.kyverno.io/title: Apply StackRox/RHACS break-glass annotation
    policies.kyverno.io/category: Security
    policies.kyverno.io/subject: workload
    policies.kyverno.io/minversion: 1.13.0
spec:
  background: true
  validationFailureAction: Audit
  mutateExistingOnPolicyUpdate: {{ .Values.stackroxAdmissionBreakGlass.mutateExistingOnPolicyUpdate }}
  rules:
    - name: add-breakglass-annotation-to-pods
      match:
        any:
          - resources:
              kinds:
                - Pod
              {{- if .Values.stackroxAdmissionBreakGlass.namespaces }}
              namespaces:
              {{- toYaml .Values.stackroxAdmissionBreakGlass.namespaces | nindent 14 }}
              {{- end }}
              {{- if .Values.stackroxAdmissionBreakGlass.namespaceSelector }}
              namespaceSelector:
              {{- toYaml .Values.stackroxAdmissionBreakGlass.namespaceSelector | nindent 14 }}
              {{- end }}
              {{- if .Values.stackroxAdmissionBreakGlass.workloadSelector }}
              selector:
              {{- toYaml .Values.stackroxAdmissionBreakGlass.workloadSelector | nindent 14 }}
              {{- end }}
      skipBackgroundRequests: {{ .Values.stackroxAdmissionBreakGlass.skipBackgroundRequests }}
      mutate:
        patchStrategicMerge:
          metadata:
            annotations:
              {{ .Values.stackroxAdmissionBreakGlass.annotationKey }}: {{ .Values.stackroxAdmissionBreakGlass.annotationValue | quote }}
    - name: add-breakglass-annotation-to-workloads
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - DeploymentConfig
                - StatefulSet
                - DaemonSet
                - ReplicaSet
                - Job
              {{- if .Values.stackroxAdmissionBreakGlass.namespaces }}
              namespaces:
              {{- toYaml .Values.stackroxAdmissionBreakGlass.namespaces | nindent 14 }}
              {{- end }}
              {{- if .Values.stackroxAdmissionBreakGlass.namespaceSelector }}
              namespaceSelector:
              {{- toYaml .Values.stackroxAdmissionBreakGlass.namespaceSelector | nindent 14 }}
              {{- end }}
              {{- if .Values.stackroxAdmissionBreakGlass.workloadSelector }}
              selector:
              {{- toYaml .Values.stackroxAdmissionBreakGlass.workloadSelector | nindent 14 }}
              {{- end }}
      skipBackgroundRequests: {{ .Values.stackroxAdmissionBreakGlass.skipBackgroundRequests }}
      mutate:
        patchStrategicMerge:
          spec:
            template:
              metadata:
                annotations:
                  {{ .Values.stackroxAdmissionBreakGlass.annotationKey }}: {{ .Values.stackroxAdmissionBreakGlass.annotationValue | quote }}
    - name: add-breakglass-annotation-to-cronjobs
      match:
        any:
          - resources:
              kinds:
                - CronJob
              {{- if .Values.stackroxAdmissionBreakGlass.namespaces }}
              namespaces:
              {{- toYaml .Values.stackroxAdmissionBreakGlass.namespaces | nindent 14 }}
              {{- end }}
              {{- if .Values.stackroxAdmissionBreakGlass.namespaceSelector }}
              namespaceSelector:
              {{- toYaml .Values.stackroxAdmissionBreakGlass.namespaceSelector | nindent 14 }}
              {{- end }}
              {{- if .Values.stackroxAdmissionBreakGlass.workloadSelector }}
              selector:
              {{- toYaml .Values.stackroxAdmissionBreakGlass.workloadSelector | nindent 14 }}
              {{- end }}
      skipBackgroundRequests: {{ .Values.stackroxAdmissionBreakGlass.skipBackgroundRequests }}
      mutate:
        patchStrategicMerge:
          spec:
            jobTemplate:
              spec:
                template:
                  metadata:
                    annotations:
                      {{ .Values.stackroxAdmissionBreakGlass.annotationKey }}: {{ .Values.stackroxAdmissionBreakGlass.annotationValue | quote }}
{{- end }}
