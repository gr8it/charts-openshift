global:
  apc:
    environment: dev
    environmentShort: d
    cluster:
      name: dev01
# TempoStack configuration
tempoStack:
  name: apc-tempo-stack
  observability:
    metrics:
      createPrometheusRules: true
      createServiceMonitors: true
  storageSize: 200Mi
  storage:
    tls:
      enabled: true
      caName: openshift-service-ca.crt
  retention:
    global:
      traces: 48h
  tenants:
    mode: openshift
    authentication:
    # Default tenant for deployment of TempoStack, will be overriden by Kyverno ClusterPolicy to create a tenant per application namespace - this parameter will be ignored by argoCD sync since Kyverno will mutate the TempoStack resource after deployment
      - tenantName: application
        tenantId: application
  template:
    compactor:
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 150Mi
    distributor:
      component:
        resources:
          limits:
            cpu: 750m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 200Mi
    gateway:
      enabled: true
      ingress:
        type: route
      component:
        resources:
          limits:
            cpu: 250m
            memory: 500Mi
          requests:
            cpu: 50m
            memory: 100Mi
    ingester:
      resources:
        limits:
          cpu: "1"
          memory: 1536Mi
        requests:
          cpu: 250m
          memory: 400Mi
    querier:
      resources:
        limits:
          cpu: 500m
          memory: 500Mi
        requests:
          cpu: 100m
          memory: 100Mi
    queryFrontend:
      component:
        resources:
          limits:
            cpu: 250m
            memory: 500Mi
          requests:
            cpu: 50m
            memory: 100Mi
      jaegerQuery:
        enabled: true
        tempoQuery:
          resources:
            limits:
              cpu: 250m
              memory: 500Mi
            requests:
              cpu: 50m
              memory: 100Mi
        resources:
          limits:
            cpu: 250m
            memory: 500Mi
          requests:
            cpu: 50m
            memory: 100Mi
  objectBucket:
    type: s3
    storageClassName: ocs-storagecluster-ceph-rgw
otelCollector:
  role:
    aggregation:
      enabled: true
      clusterRoleName: rbac.authorization.k8s.io/apc-opentelemetry-collector-apc-observability-cluster-role