---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: {{ default "apc-tempo-stack" .Values.tempoStack.name }}-generate-tenant-rolebindings-read
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    policies.kyverno.io/title: Generate RoleBindings for TempoStack traces access on namespace
    policies.kyverno.io/category: gitops
    policies.kyverno.io/subject: Generate RoleBindings for application namespaces
    policies.kyverno.io/minversion: 1.13.0
  labels:
{{- include "tempo-stack.labels" . | nindent 4 }}
spec:
  background: true
  validationFailureAction: Audit
  rules:
    - name: generate-rolebinding-reader-for-application-namespace
      match:
        any:
        - resources:
            kinds:
            - Namespace
            selector:
              matchLabels:
                {{ .Values.namespaceSelector.key }}: {{ .Values.namespaceSelector.value }}
      generate:
        generateExisting: true
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        name: {{ default "apc-tempo-stack" .Values.tempoStack.name }}-traces-read
        namespace: {{`"{{ request.object.metadata.name }}"`}}
        synchronize: true
        data:
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: {{ default "apc-tempo-stack" .Values.tempoStack.name }}-reader-{{`{{ request.object.metadata.name }}`}}
          subjects:
            - kind: Group
              name: {{ printf "APC-%s-{{ request.object.metadata.name }}-PJA" ( include "apc-global-overrides.require-environmentShort" $ | upper ) | quote }}
            - kind: Group
              name: {{ printf "APC-%s-{{ request.object.metadata.name }}-DEV" ( include "apc-global-overrides.require-environmentShort" $ | upper ) | quote }}