# set in conf repo when used via ArgoCD
# releaseServiceOverride: ArgoCD

# Default labels applied to every alert rule.
# Per-reminder labels take precedence over these defaults.
defaultLabels:
  vendor: aspecta
  team: platform

# reminders is a list of static date-based alert rules rendered into a PrometheusRule.
# No PrometheusRule is created when the list is empty.
#
# Each entry supports the following fields:
#
#   alert            (required) Prometheus alert name, e.g. OIDCVaultSecretExpirySoon
#   summary          (required) Short human-readable summary (used in alert annotation)
#   description      (required) Detailed description (used in alert annotation)
#   datetime         (required) Expiry date(time) in dd.mm.yyyy or dd.mm.yyyy HH:MM format
#                               Time defaults to 00:00 when omitted.
#   daysBeforeExpiry (optional) Days before expiry to fire the warning alert. Default: 30
#   runbookUrl       (optional) URL to the runbook for remediation steps
#   critical         (optional) If true, adds a second alert with severity: critical firing < 1 day before expiry. Default: false
#   labels           (optional) Per-alert label overrides (merged over defaultLabels)
#
reminders: []
