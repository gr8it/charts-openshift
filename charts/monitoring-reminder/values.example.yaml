# releaseServiceOverride: ArgoCD

reminders:
  - alert: OIDCVaultSecretExpirySoon
    summary: Azure Entra ID secret for vault.lab.gr8it.cloud OIDC expires in less than 30 days
    description: >
      Azure Entra ID client secret used for OIDC authentication in vault.lab.gr8it.cloud expires
      in less than 30 days. The secret is stored in Azure App Registration. After expiry, login
      to Vault via OIDC will stop working.
    datetime: "01.04.2027"
    runbookUrl: "https://github.com/gr8it/vault/blob/develop/docs/ops_guide.md#how-to-renew-expired-entraid-oidc-credentials" # optional
    critical: true # optional
