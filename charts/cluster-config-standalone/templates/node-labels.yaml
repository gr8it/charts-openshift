{{- range .Values.nodeLabels }}
---
apiVersion: v1
kind: Node
metadata:
  name: {{ required "nodeLabels[].name is required" .name }}
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
  labels:
    {{- required "nodeLabels[].labels is required" .labels | toYaml | nindent 4 }}
{{- end }}
