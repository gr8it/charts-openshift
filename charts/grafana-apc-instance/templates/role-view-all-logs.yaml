{{- if (.Values.datasourceLokiUrl | default false) }}
{{- if .Values.namespaceScoped }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "grafana-instance.name" . }}-view-all-logs
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-instance.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods","pods/log"]
    verbs: ["get"]
{{- end }}
{{- end }}
