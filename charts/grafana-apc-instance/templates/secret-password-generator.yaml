apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: {{ include "grafana-instance.name" . }}-oauth-proxy-cookie-secret
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "grafana-instance.labels" . | nindent 4 }}
spec:
  length: 26
  digits: 5
  symbols: 5
  symbolCharacters: "-_/!@^)"
  noUpper: false
  allowRepeat: false
