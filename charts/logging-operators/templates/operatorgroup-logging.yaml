{{- if .Values.operators.logging.enabled }}
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.operators.logging.namespace }}
  namespace: {{ .Values.operators.logging.namespace }}
  labels:
    {{- include "logging-operators.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
spec:
  targetNamespaces:
    - {{ .Values.operators.logging.namespace }}
{{- end }}
