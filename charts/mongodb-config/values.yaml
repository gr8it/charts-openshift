## uses following global values => do not set here
# global:
#   apc:
#     environmentShort:
#     services:
#       certManager:
#         defaultClusterIssuer:
#       metallb:
#         namespace:
## and their local overrides
# environmentShort:
# require-certManagerDefaultClusterIssuer:
# metallbNamespace:

releaseServiceOverride: ArgoCD

mongodbInstance:
  fqdns: []
  ips: []
  port: "27017"
  replicas: 3
  mongoVersion: "8.2.3"
  tls:
    enabled: true
  mongod:
    cpuLimits: 2
    memoryLimits: 16Gi
    cpuRequests: 1
    memoryRequests: 12Gi
  mongodbAgent:
    memoryLimits: 2Gi
    memoryRequests: 128Mi
  storage:
    dataVolumeSize: 500Gi
    logsVolumeSize: 1Gi

defaultUsers:
  - name: "apcAdmin"
    function: root
    roles:
      - role: root
        database: admin
  - name: "backupUser"
    function: backup
    roles:
      - role: backup
        database: admin

users: []

backup:
  enabled: true
  retention: 3
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 7
  jobBackoffLimit: 0
  s3DefaultRegion: us-east-1
  image:
    repository: ghcr.io/gr8it/apc-images/mongobackup
    tag: latest
  s3Internal:
    enabled: true
    storageClass: ocs-storagecluster-ceph-rgw

monitoring:
  enabled: true
  port: prometheus
  scrapeInterval: 30s
  scrapeTimeout: 25s
  promuser: prom

saName: mongodb-kubernetes-appdb
secretStore:  vault-hub01
