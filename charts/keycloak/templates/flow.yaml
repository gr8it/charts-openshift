  {{- include "keycloak.labels" $ | nindent 4 }}
spec:
  forProvider:
    realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
    alias: first broker login without profile review User creation or linking config
    description: Flow for the existing/non-existing user alternatives
    parentFlowAlias: first broker login without profile review
    requirement: REQUIRED
    priority: 2

  providerConfigRef:
    name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
    kind: ClusterProviderConfig
---
apiVersion: authenticationflow.keycloak.m.crossplane.io/v1alpha1
