  name: first-broker-login-without-profile-review-handle-existing
  namespace: {{ $.Release.Namespace }}
  labels:
  {{- include "keycloak.labels" $ | nindent 4 }}
spec:
  forProvider:
    realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
    alias: first broker login without profile review Handle Existing Account
    description: Handle what to do if there is existing account with same email/username like authenticated identity provider
    parentFlowAlias: first broker login without profile review User creation or linking config
    requirement: ALTERNATIVE
    priority: 2

  providerConfigRef:
    name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
    kind: ClusterProviderConfig
---
