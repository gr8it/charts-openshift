{{- if .Values.customFirstBrokerLoginFlowEnabled }}
### This is a duplicate of the inbuilt "First Broker Login Flow" with profile review DISABLED
apiVersion: authenticationflow.keycloak.m.crossplane.io/v1alpha1
kind: Flow
metadata:
  name: first-broker-login-without-profile-review
  namespace: {{ $.Release.Namespace }}
  labels:
  {{- include "keycloak.labels" $ | nindent 4 }}
spec:
  forProvider:
    realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
    alias: first broker login without profile review
    description: Actions taken after first broker login with identity provider account, which is not yet linked to any Keycloak account

  providerConfigRef:
    name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
    kind: ClusterProviderConfig
---
apiVersion: authenticationflow.keycloak.m.crossplane.io/v1alpha1
kind: Execution
metadata:
  name: first-broker-login-without-profile-review-review-profile
  namespace: {{ $.Release.Namespace }}
  labels:
  {{- include "keycloak.labels" $ | nindent 4 }}
spec:
  forProvider:
    realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
    # taken from PROVIDER_ID of https://github.com/keycloak/keycloak/tree/49240b6eace9b591bd443df43fa8bd07764a82a6/services/src/main/java/org/keycloak/authentication/authenticators/broker => https://github.com/keycloak/keycloak/blob/49240b6eace9b591bd443df43fa8bd07764a82a6/services/src/main/java/org/keycloak/authentication/authenticators/broker/IdpReviewProfileAuthenticatorFactory.java#L38
    authenticator: idp-review-profile
    parentFlowAlias: first broker login without profile review
    priority: 1
    requirement: DISABLED

  providerConfigRef:
    name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
    kind: ClusterProviderConfig
---
apiVersion: authenticationflow.keycloak.m.crossplane.io/v1alpha1
kind: ExecutionConfig
metadata:
  name: first-broker-login-without-profile-review-review-profile
  namespace: {{ $.Release.Namespace }}
  labels:
  {{- include "keycloak.labels" $ | nindent 4 }}
spec:
  forProvider:
    realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
    executionIdRef:
      name: first-broker-login-without-profile-review-review-profile
    alias:  first broker login without profile review review profile config
    config:
      update.profile.on.first.login: "missing"

  providerConfigRef:
    name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
    kind: ClusterProviderConfig
---
apiVersion: authenticationflow.keycloak.m.crossplane.io/v1alpha1
kind: Subflow
metadata:
  name: first-broker-login-without-profile-review-user-creation-or-linking
  namespace: {{ $.Release.Namespace }}
