    authenticator: idp-create-user-if-unique
    parentFlowAlias: first broker login without profile review User creation or linking config
    priority: 1
    requirement: ALTERNATIVE

  providerConfigRef:
    name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
    kind: ClusterProviderConfig
---
apiVersion: authenticationflow.keycloak.m.crossplane.io/v1alpha1
kind: ExecutionConfig
metadata:
  name: first-broker-login-without-profile-review-create-user-if-unique
  namespace: {{ $.Release.Namespace }}
  labels:
  {{- include "keycloak.labels" $ | nindent 4 }}
spec:
  forProvider:
    realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
    executionIdRef:
      name: first-broker-login-without-profile-review-create-user-if-unique
    alias:  first broker login without profile review create unique user config
    config:
      require.password.update.after.registration: "false"

  providerConfigRef:
    name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
    kind: ClusterProviderConfig
---
apiVersion: authenticationflow.keycloak.m.crossplane.io/v1alpha1
kind: Subflow
