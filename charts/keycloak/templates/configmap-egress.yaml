{{ if .Values.egressIP.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak.fullname" . }}-egressip
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    request-egressip: "{{ .Values.egressIP.count }}"
{{ end }}
