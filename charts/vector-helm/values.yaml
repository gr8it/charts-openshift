## ExternalSecret for jira-ops Atlassian OpsGenie integration
## Vault path: {{ vaultKVmountPlatform }}/{{ environmentShort }}/vector/jira-ops
## Expected key "authorization" = "GenieKey <api-key>"
jiraOpsExternalSecret:
  refreshInterval: 1h

## ExternalSecret for Splunk HEC token used by the SIEM sink.
## Default Vault path: {{ vaultKVmountPlatform }}/{{ environmentShort }}/vector/siem-token
## Expected key "token" = "<splunk-hec-token>"
siemTokenExternalSecret:
  refreshInterval: 1h
  key: ""
  property: token

## cert-manager Certificate for vector webhook TLS (secretName: vector-service)
## commonName and first dnsName derived from global.apc.cluster.baseDomain
vectorServiceCertificate:
  # Optional IP SANs for deployments that expose the webhook through a fixed VIP.
  ipAddresses: []
  additionalDnsNames: []

## MetalLB configuration for exposing the Vector service through a reserved VIP.
## Customer-specific addresses belong in the environment config repo.
vectorMetalLB:
  enabled: true
  addresses: []
  autoAssign: true
  nodeSelectors:
    - matchLabels:
        node-role.kubernetes.io/worker: ""

## Additional ingress CIDRs for the Vector NetworkPolicy.
## Namespace-based ingress for stackrox/logging/monitoring is chart-owned.
vectorNetworkPolicy:
  enabled: true
  syslogUdpCidrs: []
  syslogTcpCidrs: []
  webhookCidrs: []

## Customer-specific SIEM sink settings.
vectorSiem:
  endpoint: ""
  tls:
    verifyCertificate: false
    verifyHostname: false

## Vector subchart values
## See: https://github.com/vectordotdev/helm-charts/tree/develop/charts/vector
vector:
  logLevel: info

  # Keep legacy resource names stable so Argo can adopt the existing cluster objects.
  fullnameOverride: vector
  role: Agent
  rollWorkload: false

  nodeSelector:
    node-role.kubernetes.io/worker: ""

  persistence:
    hostPath:
      enabled: false

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  # Disable the upstream Agent host mounts. This chart mounts only the APC-owned
  # secrets that the Vector config references.
  defaultVolumes: []
  defaultVolumeMounts: []

  existingConfigMaps:
    - vector
  dataDir: /vector-data-dir

  # Rely on Stakater Reloader for ConfigMap/Secret driven restarts because the
  # packaged subchart cannot deterministically checksum parent-owned ConfigMaps
  # during offline GitOps rendering.
  podAnnotations:
    reloader.stakater.com/auto: "true"

  service:
    enabled: false
  serviceHeadless:
    enabled: false
  podMonitor:
    enabled: false

  extraVolumes:
    - name: vector-token
      secret:
        secretName: vector-token
        defaultMode: 420
    - name: jira-ops
      secret:
        secretName: jira-ops
        defaultMode: 420
    - name: vector-service
      secret:
        secretName: vector-service
        defaultMode: 420
    - name: siem-token
      secret:
        secretName: siem-token
        defaultMode: 420

  extraVolumeMounts:
    - name: vector-token
      readOnly: true
      mountPath: /var/run/ocp-collector/secrets/vector-token
    - name: jira-ops
      readOnly: true
      mountPath: /var/run/ocp-collector/secrets/jira-ops
    - name: vector-service
      readOnly: true
      mountPath: /var/run/ocp-collector/secrets/vector-service
    - name: siem-token
      readOnly: true
      mountPath: /var/run/ocp-collector/secrets/siem-token
