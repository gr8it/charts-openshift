{{- if gt (len (.Values.vectorMetalLB.addresses | default list)) 0 }}
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: vector
  namespace: {{ include "apc-global-overrides.metallbNamespace" . }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  ipAddressPools:
    - vector-reserved
  nodeSelectors:
    {{- toYaml .Values.vectorMetalLB.nodeSelectors | nindent 4 }}
{{- end }}
