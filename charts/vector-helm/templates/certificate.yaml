apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vector-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vector-helm.labels" . | nindent 4 }}
spec:
  secretName: vector-service
  issuerRef:
    name: {{ include "apc-global-overrides.require-certManagerDefaultClusterIssuer" . }}
    kind: ClusterIssuer
  commonName: "{{ include "vector-helm.vectorFullname" . }}.{{ include "apc-global-overrides.clusterBaseDomain" . }}"
  dnsNames:
    - "{{ include "vector-helm.vectorFullname" . }}.{{ .Release.Namespace }}.svc"
    - "{{ include "vector-helm.vectorFullname" . }}.{{ .Release.Namespace }}.svc.cluster.local"
    - "{{ include "vector-helm.vectorFullname" . }}.{{ include "apc-global-overrides.clusterBaseDomain" . }}"
    {{- range (.Values.vectorServiceCertificate).additionalDnsNames }}
    - {{ . | quote }}
    {{- end }}
  {{- if gt (len (.Values.vectorMetalLB.addresses | default list)) 0 }}
  ipAddresses:
    {{- range .Values.vectorMetalLB.addresses }}
    - {{ regexReplaceAll "/.*$" . "" }}
    {{- end }}
  {{- end }}
