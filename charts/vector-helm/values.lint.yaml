global:
  apc:
    environmentShort: h
    cluster:
      baseDomain: cluster.example.com
    services:
      certManager:
        defaultClusterIssuer: vault-hub-issuer
      externalSecretsOperator:
        defaultClusterSecretStore: vault-hub-secret-store
      vault:
        KVmountPlatform: apc-platform

vectorMetalLB:
  addresses:
    - 10.111.76.100/32

vectorNetworkPolicy:
  syslogUdpCidrs:
    - 10.111.126.0/26
    - 10.111.26.0/25
  syslogTcpCidrs:
    - 10.111.126.0/26
    - 10.111.26.0/25
  webhookCidrs:
    - 10.11.76.0/23
    - 10.13.76.0/23
    - 10.14.76.0/23

vectorJira:
  endpoint: https://api.atlassian.com/jsm/ops/integration/v2/alerts

vectorRhacs:
  customerTag: example-customer

vectorSiem:
  sinkName: example_siem_splunk
  endpoint: https://siem.example.com:8088/
