apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: microservices.bpm.ck.socpoist.sk
  labels:
    {{- include "apps-centralne-komponenty-bpm.labels" . | nindent 4 }}
spec:
  compositeTypeRef:
    apiVersion: bpm.ck.socpoist.sk/v1alpha1
    kind: Microservice
  mode: Pipeline
  pipeline:

  - step: microservice-client
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: openidclient.keycloak.m.crossplane.io/v1alpha1
          kind: Client
          metadata:
            name: {{`{{ .observed.composite.resource.metadata.name }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: ms-client
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientId: {{`{{ .observed.composite.resource.metadata.name }}`}}
              name: {{`{{ .observed.composite.resource.metadata.name }}`}}
              description: {{`{{ .observed.composite.resource.metadata.name }}`}} mikrosluzba
              accessType: BEARER-ONLY
              frontchannelLogoutEnabled: true
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig

  - step: microservice-clientroles
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{`{{- range $value := .observed.composite.resource.spec.roles }}`}}
          apiVersion: role.keycloak.m.crossplane.io/v1alpha1
          kind: Role
          metadata:
            name: {{`{{ $.observed.composite.resource.metadata.name }}`}}-{{`{{ $value }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: ms-client-role-{{`{{ $value }}`}}
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              name: {{`{{ $value }}`}}
              clientIdRef:
                name: {{`{{ $.observed.composite.resource.metadata.name }}`}}
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig
          ---
          {{`{{- end }}`}}

  {{- if .Values.idpRoleMapper.enabled }}
  - step: microservice-identityprovider-mapper-roles
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{`{{- range $value := .observed.composite.resource.spec.roles }}`}}
          apiVersion: identityprovider.keycloak.m.crossplane.io/v1alpha1
          kind: IdentityProviderMapper
          metadata:
            name: {{ .Values.idpRoleMapper.identityProviderAlias }}-{{`{{ $.observed.composite.resource.metadata.name }}`}}-{{`{{ $value }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: ms-idp-mapper-roles-{{`{{ $value }}`}}
          spec:
            forProvider:
              realm: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              identityProviderAlias: {{ .Values.idpRoleMapper.identityProviderAlias }}
              name: {{`{{ $.observed.composite.resource.metadata.name }}`}} {{`{{ $value }}`}} role mapper
              identityProviderMapper: "oidc-advanced-role-idp-mapper"
              extraConfig:
                syncMode: "FORCE"
                are.claim.values.regex: "true"
                role: "{{`{{ $.observed.composite.resource.metadata.name }}`}}.{{`{{ $value }}`}}"
                claims: '[{"key": "groups", "value": "{{ tpl .Values.idpRoleMapper.groupMatchingRegex . }} "}]'

            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig
          ---
          {{`{{- end }}`}}
  {{- end }}

  {{- if .Values.groupRoleMapping.enabled }}
  - step: microservice-groups
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{`{{- range $value := .observed.composite.resource.spec.roles }}`}}
          apiVersion: group.keycloak.m.crossplane.io/v1alpha1
          kind: Group
          metadata:
            name: {{ tpl .Values.groupRoleMapping.groupTpl . | lower }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: ms-groups-{{`{{ $value }}`}}
          spec:
            managementPolicies: ["Observe"]
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              name: {{ tpl .Values.groupRoleMapping.groupTpl . }}
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig
          ---
          {{`{{- end }}`}}

  - step: microservice-group-roles
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{`{{- range $value := .observed.composite.resource.spec.roles }}`}}
          apiVersion: group.keycloak.m.crossplane.io/v1alpha1
          kind: Roles
          metadata:
            name: {{ tpl .Values.groupRoleMapping.groupTpl . | lower }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: ms-group-roles-{{`{{ $value }}`}}
          spec:
            forProvider:
              exhaustive: false
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              groupIdRef: 
                name: {{ tpl .Values.groupRoleMapping.groupTpl . | lower }}
              roleIdsRefs:
              - name: {{`{{ $.observed.composite.resource.metadata.name }}`}}-{{`{{ $value }}`}}
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig
          ---
          {{`{{- end }}`}}
  {{- end }}

  - step: microservice-admin-client
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: openidclient.keycloak.m.crossplane.io/v1alpha1
          kind: Client
          metadata:
            name: {{`{{ .observed.composite.resource.metadata.name }}`}}-admin
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: ms-admin-client
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientId: {{`{{ .observed.composite.resource.metadata.name }}`}}-admin
              name: {{`{{ .observed.composite.resource.metadata.name }}`}}-admin
              description: {{`{{ .observed.composite.resource.metadata.name }}`}} admin mikrosluzba
              accessType: PUBLIC
              standardFlowEnabled: true
              {{`{{- if .observed.composite.resource.spec.rootUrl }}`}}
              rootUrl: {{`{{ .observed.composite.resource.spec.rootUrl }}`}}
              {{`{{- end }}`}}
              {{`{{- if .observed.composite.resource.spec.baseUrl }}`}}
              baseUrl: {{`{{ default .observed.composite.resource.spec.baseUrl }}`}}
              {{`{{- end }}`}}
              validRedirectUris:
                {{`{{- range .observed.composite.resource.spec.validRedirectUris }}`}}
                - {{`{{ . }}`}}
                {{`{{- end }}`}}
              {{`{{- if .observed.composite.resource.spec.webOrigins }}`}}
              webOrigins:
                {{`{{- range .observed.composite.resource.spec.webOrigins }}`}}
                - {{`{{ . }}`}}
                {{`{{- end }}`}}
              {{`{{- end }}`}}
              frontchannelLogoutEnabled: true
              pkceCodeChallengeMethod: {{ .Values.pkceCodeChallengeMethod }}
              fullScopeAllowed: false
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig

  - step: microservice-admin-rolemappers
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{`{{- range $value := .observed.composite.resource.spec.roles }}`}}
          apiVersion: client.keycloak.m.crossplane.io/v1alpha1
          kind: RoleMapper
          metadata:
            name: {{`{{ $.observed.composite.resource.metadata.name }}`}}-admin-{{`{{ $.observed.composite.resource.metadata.name }}`}}-{{`{{ $value }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: ms-admin-client-rolemapper-{{`{{ $value }}`}}
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientIdRef:
                name: {{`{{ $.observed.composite.resource.metadata.name }}`}}-admin
              roleIdRef:
                name: {{`{{ $.observed.composite.resource.metadata.name }}`}}-{{`{{ $value }}`}}
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig
          ---
          {{`{{- end }}`}}

  - step: microservice-admin-protocolmapper
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: client.keycloak.m.crossplane.io/v1alpha1
          kind: ProtocolMapper
          metadata:
            name: {{`{{ .observed.composite.resource.metadata.name }}`}}-admin-audience-{{`{{ .observed.composite.resource.metadata.name }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: ms-admin-client-protocolmapper
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientIdRef:
                name: {{`{{ $.observed.composite.resource.metadata.name }}`}}-admin
              protocol: openid-connect
              protocolMapper: oidc-audience-mapper
              name: {{`{{ $.observed.composite.resource.metadata.name }}`}} audience
              # https://github.com/keycloak/keycloak/blob/0f01444543cf5e755b13a62c233a5c9feef72888/services/src/main/java/org/keycloak/protocol/oidc/mappers/OIDCAttributeMapperHelper.java#L60
              config:
                "included.client.audience": "{{`{{ $.observed.composite.resource.metadata.name }}`}}"
                "access.token.claim": "true"
                "introspection.token.claim": "true"
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig

  - step: bamoe-client
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: openidclient.keycloak.m.crossplane.io/v1alpha1
          kind: Client
          metadata:
            name: {{ .Values.bamoe.clientId }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: bamoe-client
          spec:
            managementPolicies: ["Observe"]
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientId: {{ .Values.bamoe.clientId }}
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig

  - step: bamoe-rolemappers
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{`{{- range $value := .observed.composite.resource.spec.roles }}`}}
          apiVersion: client.keycloak.m.crossplane.io/v1alpha1
          kind: RoleMapper
          metadata:
            name: bamoe-{{`{{ $.observed.composite.resource.metadata.name }}`}}-{{`{{ $value }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: bamoe-client-rolemapper-{{`{{ $value }}`}}
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientIdRef:
                name: {{ .Values.bamoe.clientId }}
              roleIdRef:
                name: {{`{{ $.observed.composite.resource.metadata.name }}`}}-{{`{{ $value }}`}}
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig
          ---
          {{`{{- end }}`}}

  - step: bamoe-protolmapper
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: client.keycloak.m.crossplane.io/v1alpha1
          kind: ProtocolMapper
          metadata:
            name: bamoe-audience-{{`{{ .observed.composite.resource.metadata.name }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: bamoe-client-protocolmapper
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientIdRef:
                name: {{ .Values.bamoe.clientId }}
              protocol: openid-connect
              protocolMapper: oidc-audience-mapper
              name: add {{`{{ .observed.composite.resource.metadata.name }}`}} audience
              # https://github.com/keycloak/keycloak/blob/0f01444543cf5e755b13a62c233a5c9feef72888/services/src/main/java/org/keycloak/protocol/oidc/mappers/OIDCAttributeMapperHelper.java#L60
              config:
                "included.client.audience": "{{`{{ .observed.composite.resource.metadata.name }}`}}"
                "access.token.claim": "true"
                "introspection.token.claim": "true"
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig

  - step: automatically-detect-readiness
    functionRef:
      name: crossplane-xr-functions-auto-ready
