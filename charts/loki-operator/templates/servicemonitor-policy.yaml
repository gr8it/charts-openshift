{{- if .Values.metricsServiceMonitorPatch.enabled }}
{{- $operatorPolicyValues := index .Values "acm-operatorpolicy" }}
{{- $namespace := .Values.metricsServiceMonitorPatch.namespace | default $operatorPolicyValues.subscription.namespace }}
{{- $serviceMonitorName := .Values.metricsServiceMonitorPatch.serviceMonitorName | default "loki-operator-metrics-monitor" }}
{{- $serviceName := .Values.metricsServiceMonitorPatch.serviceName | default "loki-operator-controller-manager-metrics-service" }}
{{- $clusterRoleBindingName := .Values.metricsServiceMonitorPatch.clusterRoleBindingName | default "loki-operator-controller-manager-read-metrics" }}
{{- $metricsReaderServiceAccountName := .Values.metricsServiceMonitorPatch.metricsReaderServiceAccountName | default "loki-operator-controller-manager-metrics-reader" }}
---
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: {{ include "loki-operator.fullname" . }}-metrics-patch
  namespace: open-cluster-management-policies
  labels:
    {{- include "loki-operator.labels" . | nindent 4 }}
spec:
  remediationAction: enforce
  severity: medium
  pruneObjectBehavior: None
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        metadata:
          name: {{ $serviceMonitorName }}
          namespace: {{ $namespace }}
        spec:
          endpoints:
            - tlsConfig:
                serverName: {{ printf "%s.%s.svc" $serviceName $namespace }}
    - complianceType: musthave
      objectDefinition:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: {{ $clusterRoleBindingName }}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: loki-operator-metrics-reader
        subjects:
          - kind: ServiceAccount
            name: {{ $metricsReaderServiceAccountName }}
            namespace: {{ $namespace }}
{{- end }}
