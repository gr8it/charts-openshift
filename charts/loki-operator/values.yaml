# OperatorPolicy Values
acm-operatorpolicy:
  operatorGroup:
    name: openshift-loki-operator
    namespace: openshift-loki-operator
  subscription:
    channel: stable-6.1
    name: loki-operator
    namespace: openshift-loki-operator
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    startingCSV: loki-operator.v6.1.4
  upgradeApproval: Automatic
  versions:
    - loki-operator.v6.1.4

metricsServiceMonitorPatch:
  enabled: true
  namespace: openshift-loki-operator
  serviceMonitorName: loki-operator-metrics-monitor
  serviceName: loki-operator-controller-manager-metrics-service
  clusterRoleBindingName: loki-operator-controller-manager-read-metrics
  metricsReaderServiceAccountName: loki-operator-controller-manager-metrics-reader
