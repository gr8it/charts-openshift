{{- if eq (include "apc-global-overrides.clusterIsHub" .) "true" }}
---
# Grants the pushgateway SA the ability to GET Prometheus instances,
# satisfying the OAuth proxy delegate authorization check.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pushgateway-helm.fullname" . }}-prometheus-access
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pushgateway-helm.labels" . | nindent 4 }}
rules:
  - apiGroups: [monitoring.coreos.com]
    resources: [prometheuses]
    verbs: [get]
{{- end }}
