{{- if eq (include "apc-global-overrides.clusterIsHub" .) "true" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pushgateway-helm.prometheusAccessRoleBindingName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pushgateway-helm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pushgateway-helm.prometheusAccessRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pushgateway-helm.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
