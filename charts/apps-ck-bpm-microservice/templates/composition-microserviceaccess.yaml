apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: microserviceaccesses.bpm.ck.socpoist.sk
  labels:
    {{- include "apps-centralne-komponenty-bpm.labels" . | nindent 4 }}
spec:
  compositeTypeRef:
    apiVersion: bpm.ck.socpoist.sk/v1alpha1
    kind: Microserviceaccess
  mode: Pipeline
  pipeline:

  - step: isas-client
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: openidclient.keycloak.m.crossplane.io/v1alpha1
          kind: Client
          metadata:
            name: {{`{{ .observed.composite.resource.metadata.name }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: msa-client-{{`{{ .observed.composite.resource.metadata.name }}`}}
          spec:
            managementPolicies: ["Observe"]
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientId: {{`{{ .observed.composite.resource.metadata.name }}`}}
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig

  - step: isas-rolemapper
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: client.keycloak.m.crossplane.io/v1alpha1
          kind: RoleMapper
          metadata:
            name: {{`{{ .observed.composite.resource.metadata.name }}`}}-{{`{{ .observed.composite.resource.spec.clientId }}`}}-{{`{{ .observed.composite.resource.spec.clientRole }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: msa-client-rolemapper-{{`{{ .observed.composite.resource.metadata.name }}`}}-{{`{{ .observed.composite.resource.spec.clientId }}`}}-{{`{{ .observed.composite.resource.spec.clientRole }}`}}
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientIdRef:
                name: {{`{{ .observed.composite.resource.metadata.name }}`}}
              roleIdRef:
                name: {{`{{ .observed.composite.resource.spec.clientId }}`}}-{{`{{ .observed.composite.resource.spec.clientRole }}`}}
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig

  - step: microservice-admin-protocolmapper
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: client.keycloak.m.crossplane.io/v1alpha1
          kind: ProtocolMapper
          metadata:
            name: {{`{{ .observed.composite.resource.metadata.name }}`}}-audience-{{`{{ .observed.composite.resource.spec.clientId }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: msa-client-protocolmapper-{{`{{ .observed.composite.resource.metadata.name }}`}}-audience-{{`{{ .observed.composite.resource.spec.clientId }}`}}
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              clientIdRef:
                name: {{`{{ .observed.composite.resource.metadata.name }}`}}
              protocol: openid-connect
              protocolMapper: oidc-audience-mapper
              name: {{`{{ .observed.composite.resource.spec.clientId }}`}} audience
              # https://github.com/keycloak/keycloak/blob/0f01444543cf5e755b13a62c233a5c9feef72888/services/src/main/java/org/keycloak/protocol/oidc/mappers/OIDCAttributeMapperHelper.java#L60
              config:
                "included.client.audience": "{{`{{ .observed.composite.resource.spec.clientId }}`}}"
                "access.token.claim": "true"
                "introspection.token.claim": "true"
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig

  - step: bamoe-client
    functionRef:
      name: crossplane-xr-functions-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: openidclient.keycloak.m.crossplane.io/v1alpha1
          kind: ClientServiceAccountRole
          metadata:
            name: {{`{{ .observed.composite.resource.metadata.name }}`}}-{{`{{ .observed.composite.resource.spec.clientId }}`}}-{{`{{ .observed.composite.resource.spec.clientRole }}`}}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: msa-clientserviceaccountrole-{{`{{ .observed.composite.resource.metadata.name }}`}}-{{`{{ .observed.composite.resource.spec.clientId }}`}}-{{`{{ .observed.composite.resource.spec.clientRole }}`}}
          spec:
            forProvider:
              realmId: {{ include "apc-global-overrides.require-keycloakRealm" . }}
              serviceAccountUserClientIdRef:
                name: {{`{{ .observed.composite.resource.metadata.name }}`}}
              clientIdRef:
                name: {{`{{ .observed.composite.resource.spec.clientId }}`}}
              role: {{`{{ .observed.composite.resource.spec.clientRole }}`}}
            providerConfigRef:
              name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
              kind: ClusterProviderConfig

  - step: automatically-detect-readiness
    functionRef:
      name: crossplane-xr-functions-auto-ready
