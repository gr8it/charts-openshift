{{- if eq (include "apc-global-overrides.clusterIsHub" .) "true" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "pushgateway-helm.fullname" . }}-tokenreview-binding
  labels:
    {{- include "pushgateway-helm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "pushgateway-helm.fullname" . }}-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ include "pushgateway-helm.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
