---
# Allows external service accounts (e.g. veeam-sa) to push metrics to
# this Pushgateway by satisfying the OAuth proxy delegate authorization check.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pushgateway-helm.pushMetricsClusterRoleName" . }}
  labels:
    {{- include "pushgateway-helm.labels" . | nindent 4 }}
rules:
  - apiGroups: [monitoring.coreos.com]
    resources: [prometheuses, servicemonitors]
    verbs: [get, list]
