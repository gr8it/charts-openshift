{{- if and (eq (include "apc-global-overrides.clusterIsHub" .) "true") .Values.hub.spokeLogforward.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.hub.spokeLogforward.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "logging-helm.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.hub.spokeLogforward.clusterRoleBinding.name }}
  labels:
    {{- include "logging-helm.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-logging-write-audit-logs
subjects:
  - kind: ServiceAccount
    name: {{ .Values.hub.spokeLogforward.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
