nameOverride: ""
fullnameOverride: ""

# --- ObjectBucketClaim ---
objectBucketClaim:
  enabled: true
  storageClassName: ocs-storagecluster-ceph-rgw
  bucketName: ~

# --- LokiStack ---
lokistack:
  size: 1x.pico
  storage:
    schemas:
      - effectiveDate: "2024-10-01"
        version: v13
  storageClassName: ocs-storagecluster-ceph-rbd
  replication:
    factor: 2
    zones:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
  limits:
    global:
      ingestion:
        ingestionRate: 6
        ingestionBurstSize: 32
        perStreamRateLimit: 4
        perStreamRateLimitBurst: 17
      queries:
        queryTimeout: 60s
    retention:
      days: 7
      streams: []
  rules:
    enabled: false
    selector:
      matchLabels:
        openshift.io/log-alerting: 'true'

# --- UIPlugin ---
uiplugin:
  enabled: true

# --- ClusterLogForwarder collector ---
collector:
  resources:
    limits:
      cpu: "6"
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 512Mi

# --- Hub forwarding output ---
hubForwarding:
  enabled: false
  url: ""

# --- Audit to hub pipeline ---
auditToHub:
  enabled: false

# --- Vector webhook output ---
vectorWebhook:
  enabled: false
  url: ""

# --- Postgres audit ---
pgaudit:
  enabled: false

# --- ExternalSecret (hub-spoke token) ---
externalSecret:
  enabled: false
  refreshInterval: "15m"

# --- Hub-specific resources ---
hub:
  spokeLogforward:
    enabled: false
  alertingRules:
    customerName: ""
    acs:
      enabled: false
      centralUrl: ""
      namespaceRegex: "apc-.*|cert-manager.*|cert-utils|crossplane-system|default|group-sync-operator|kube.*|nodepool-.*|open-cluster-management.*|openshift.*|rhacs-operator|stackrox|veeam|vm-templates"
    hwEvents:
      enabled: false
