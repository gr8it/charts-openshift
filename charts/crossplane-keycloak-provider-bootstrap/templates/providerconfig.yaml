# apiVersion: keycloak.m.crossplane.io/v1beta1
# kind: ClusterProviderConfig
apiVersion: keycloak.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
  labels:
    {{- include "crossplane-keycloak-provider-bootstrap.labels" . | nindent 4 }}
spec:
  credentials:
    source: Secret
    secretRef:
      name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
      key: {{ .Values.credentialsConfigKey }}
      namespace: {{ .Release.Namespace }}
