apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-keycloak-provider-bootstrap.labels" . | nindent 4 }}
    type: provider-credentials
spec:
  refreshInterval: 1h # default 1h
  secretStoreRef:
    name: vault-hub-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ include "apc-global-overrides.require-crossplaneKubeKeycloakProviderConfigName" . }}
    creationPolicy: Owner
    template:
      data:
        {{ .Values.credentialsConfigKey }}: |
          {
            "client_id":"{{ .Values.adminCliClientID }}",
            "username": "{{`{{ .username }}`}}",
            "password": "{{`{{ .password }}`}}",
            "url": "{{ include "apc-global-overrides.require-keycloakUrl" . }}",
            "base_path": "",
            "realm": "master",
            "tls_insecure_skip_verify": "false"
            {{- if (include "apc-global-overrides.caCertificates" .) | fromYaml }}
            , "root_ca_certificate": {{ include "apc-global-overrides.caCertificatesBundle" . | toJson }}
            {{- end }}
          }
#            "realm": "master",
  data:
  - secretKey: username
    remoteRef:
      key: {{ include "apc-global-overrides.require-vaultKVmountPlatform" . }}/{{ include "apc-global-overrides.require-environmentShort" . }}/keycloak/{{ include "apc-global-overrides.require-keycloakRealm" . }}/provisioning
      property: username
  - secretKey: password
    remoteRef:
      key: {{ include "apc-global-overrides.require-vaultKVmountPlatform" . }}/{{ include "apc-global-overrides.require-environmentShort" . }}/keycloak/{{ include "apc-global-overrides.require-keycloakRealm" . }}/provisioning
      property: password
