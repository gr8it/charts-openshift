apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: metallb-app-ip
spec:
  compositeTypeRef:
    apiVersion: metallb.aspecta.crossplane.io/v1alpha1
    kind: metallbipadresspoll
  mode: Pipeline
  pipeline:
    # Step 1: Read apc-metallb-ip-range for metallb address ranges
    - step: environmentConfigs
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
          - type: Reference
            ref:
              name: apc-mettalb-ip-range
    # debug
    - step: debug
      functionRef:
        name: function-debug
      input:
        apiVersion: function-debug.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          depth: 10
    # step 2: get allocated IP from existing IPAddressPool.metallb.io/v1beta1
    - step: read-existing-ipadresspool
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
        - name: existing-ip-pool
          base:
            apiVersion: metallb.io/v1beta1
            kind: IPAddressPool
    # step 3: create IPAddressPool and L2Advertisement resources with the allocated IP and reference them in the composite status
    # - step: create-resources
    #   functionRef:
    #     name: function-go-templating
    #   input:
    #     apiVersion: gotemplate.fn.crossplane.io/v1beta1
    #     kind: GoTemplate
    #     source: Inline
    #     inline:
    #       template: |
    - step: create-resources
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
        - name: crossplane-test-pool
          base:
            apiVersion: metallb.io/v1beta1
            kind: IPAddressPool
            metadata:
              name: crossplane-test-pool
              namespace: default
            spec:
              addresses:
              - 10.11.26.132/32
              autoAssign: true
              avoidBuggyIPs: false
              serviceAllocation:
                namespaces:
                  - apc-crossplane-system
